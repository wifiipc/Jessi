<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para ti ❤️</title>
    <style>
        /* --- FUENTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Dancing+Script:wght@700&family=Pacifico&display=swap');

        /* --- BASE & RESET --- */
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
        :root { --dark-color: #000; --accent: #ff4d6d; --glass: rgba(255, 255, 255, 0.1); }

        html { background-color: var(--dark-color); overscroll-behavior: none; }

        body {
            margin: 0; background-color: var(--dark-color);
            font-family: 'Montserrat', sans-serif; color: white;
            height: 100dvh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #main-container {
            height: 100dvh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory;
            scroll-behavior: smooth; position: absolute; top: 0; left: 0; scrollbar-width: none;
        }
        #main-container::-webkit-scrollbar { display: none; }

        .escena {
            position: relative; width: 100%; height: 100dvh;
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            overflow: hidden;
        }

        /* --- BOTÓN VOLVER --- */
        #back-btn {
            position: fixed; top: 25px; left: 20px; z-index: 50000;
            background: rgba(20,20,20,0.8); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; border-radius: 20px; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; font-weight: 500; cursor: pointer; display: none; backdrop-filter: blur(10px);
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #back-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 60000; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .login-card {
            text-align: center; width: 85%; max-width: 350px; padding: 30px;
            background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; box-shadow: 0 0 40px rgba(255, 77, 109, 0.15);
        }
        .date-inputs { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        select { background: #222; color: white; border: 1px solid #444; padding: 12px 5px; border-radius: 10px; flex: 1; outline: none; text-align: center;}
        .unlock-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .unlock-btn:active { transform: scale(0.95); }
        .error-msg { color: #ff4d4d; margin-top: 15px; font-size: 0.9rem; opacity: 0; transition: 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* --- INTRO NETFLIX --- */
        #netflix-intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 55000; display: none; 
            justify-content: center; align-items: center;
        }
        .netflix-n {
            color: #E50914; font-family: 'Arial', sans-serif; font-size: 12rem; font-weight: bold;
            text-shadow: 0 0 50px rgba(229, 9, 20, 0.6); transform: scale(0.5); opacity: 0;
            animation: netflixZoom 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes netflixZoom {
            0% { transform: scale(0.5); opacity: 0; }
            15% { transform: scale(1); opacity: 1; }
            75% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(4); opacity: 0; filter: blur(20px); }
        }

        /* --- PANTALLA PERFILES --- */
        #profile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 45000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.8s ease;
        }
        .profile-title { font-family: 'Montserrat', sans-serif; font-size: 2rem; color: white; margin-bottom: 40px; text-align: center; font-weight: 500; letter-spacing: 1px;}
        .profiles-container { display: flex; gap: 30px; }
        .profile-card { cursor: pointer; text-align: center; transition: transform 0.3s ease; }
        .profile-card:hover { transform: scale(1.05); }
        .profile-img { width: 110px; height: 110px; border-radius: 10px; border: 3px solid transparent; transition: border-color 0.3s; display: flex; justify-content: center; align-items: center; font-size: 4rem; margin-bottom: 10px; }
        .profile-card:hover .profile-img { border-color: white; }
        .profile-sv .profile-img { background: linear-gradient(135deg, #ff006e, #ff4d6d); }
        .profile-6m .profile-img { background: linear-gradient(135deg, #3a0ca3, #4cc9f0); }
        .profile-name { font-size: 1.1rem; color: #ccc; transition: color 0.3s; }
        .profile-card:hover .profile-name { color: white; font-weight: bold; }

        /* --- POP-UP MÚSICA --- */
        #music-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 30000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .music-card { background: #121212; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; }
        .song-list { display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; margin-top: 20px; padding-right: 5px; }
        .song-list::-webkit-scrollbar { width: 6px; }
        .song-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .song-btn { background: #282828; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; text-align: left; }
        .song-btn:active { background: #444; }

        /* --- REPRODUCTOR --- */
        .spotify-player {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; height: 75px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 20000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: opacity 1s, transform 0.5s; opacity: 0; pointer-events: none;
        }
        .spotify-player.visible { opacity: 1; pointer-events: all; }
        .track-info { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; overflow: hidden; margin-right: 10px; }
        .track-dropdown { background: transparent; color: white; border: none; outline: none; font-weight: 600; font-size: 0.95rem; font-family: 'Montserrat', sans-serif; width: 100%; cursor: pointer; padding: 0; appearance: none; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; margin-bottom: 2px;}
        .track-dropdown option { background: #222; color: white; font-size: 0.9rem;}
        .track-artist { font-size: 0.75rem; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .control-btn { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 5px; transition: color 0.3s; }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .shuffle-active { color: var(--accent) !important; }
        .play-btn { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; color: white !important; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4); display: flex; align-items: center; justify-content: center; padding: 0; }
        .play-btn svg { width: 18px; height: 18px; fill: white; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0%; border-radius: 0 0 0 12px; transition: width 0.1s linear; }

        /* --- MODAL FOTO --- */
        #photo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 80000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
        }
        #photo-overlay.active { opacity: 1; pointer-events: all; }
        .photo-detail-card { background: #151515; padding: 15px; border-radius: 20px; max-width: 500px; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 50px rgba(255,77,109,0.15); }
        .photo-detail-card img { width: 100%; max-height: 55vh; object-fit: contain; border-radius: 12px; margin-bottom: 20px; }
        .photo-text { font-family: 'Montserrat'; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.5; color: #eee; }
        .close-photo-btn { background: var(--accent); color: white; border: none; padding: 12px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* --- INDICADOR SCROLL --- */
        .scroll-hint { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 0.8rem; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 5px; animation: fadeInOut 3s infinite; pointer-events: none; letter-spacing: 2px; text-transform: uppercase; }
        .scroll-arrow svg { width: 30px; height: 30px; fill: none; stroke: white; stroke-width: 2; animation: bounceArrow 2s infinite; }
        @keyframes bounceArrow { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        
        .titulo-flotante { position: absolute; top: 15%; font-family: 'Pacifico'; font-size: 2.5rem; color: #ff99ac; text-shadow: 0 0 20px #ff006e; z-index: 10; animation: flotar 3s infinite; text-align: center; width: 100%; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- ESCENAS SAN VALENTÍN (SV) --- */
        .escena-sv { display: none; } /* Ocultas por defecto hasta elegir perfil */
        
        #universo { background: black; }
        #starCanvas { position: absolute; z-index: 1; top:0; left:0; width:100%; height:100%; }
        #universo::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; background: radial-gradient(ellipse at center, transparent 60%, rgba(10,10,18,0.9) 100%), linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%); }
        #contenido-texto { position: relative; z-index: 10; text-align: center; text-shadow: 0 0 20px var(--accent); width: 85%; max-width: 600px; transform: translateY(-5%); }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.8rem; color: #ff4d6d; margin: 0; line-height: 1.1; }
        #maquina-escribir { color: #fff; font-weight: 500; letter-spacing: 1px; font-size: 1.2rem; }

        #corazon-scene { background: radial-gradient(circle, #1a0b14 0%, #000 100%); }
        #heartCanvas { position: absolute; z-index: 1; }
        
        #galeria { background: #000; overflow: hidden; }
        .carousel-container { position: relative; width: 140px; height: 200px; transform-style: preserve-3d; animation: rotarCarrusel 20s infinite linear; margin-top: 40px; }
        .foto-card { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); border: 2px solid #ff4d6d; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,77,109,0.5); cursor: pointer; }
        .foto-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        @keyframes rotarCarrusel { from { transform: perspective(1000px) rotateY(0deg); } to { transform: perspective(1000px) rotateY(360deg); } }

        /* --- NUEVA ESCENA 6 MESES: ROLLO DE PELÍCULA --- */
        .escena-6m { display: none; background: #050505; align-items: center; justify-content: center; }
        .film-wrapper {
            position: relative; width: 100vw; background: #111; padding: 40px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        /* Perforaciones de la cinta analógica superior e inferior */
        .film-wrapper::before, .film-wrapper::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 20px;
            background-image: linear-gradient(90deg, transparent 40%, #000 40%);
            background-size: 30px 20px; z-index: 5;
        }
        .film-wrapper::before { top: 5px; }
        .film-wrapper::after { bottom: 5px; }
        
        .film-strip-scroll {
            display: flex; gap: 15px; padding: 0 50vw 0 20px; overflow-x: auto; 
            scroll-snap-type: x mandatory; scrollbar-width: none; align-items: center;
        }
        .film-strip-scroll::-webkit-scrollbar { display: none; }
        
        .film-frame {
            flex: 0 0 auto; width: 220px; height: 300px; scroll-snap-align: center;
            background: #000; border: 2px solid #333; padding: 5px; cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
        }
        .film-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(15%) sepia(20%) contrast(1.1); transition: 0.3s; }
        .film-frame:hover { transform: scale(1.05); z-index: 10; border-color: #4cc9f0; }
        .film-frame:hover img { filter: grayscale(0%) sepia(0%) contrast(1); }

        .swipe-hint { position: absolute; top: 15%; color: #4cc9f0; font-family: 'Montserrat'; letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; animation: fadeInOut 2s infinite; }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .carousel-container { width: 120px; height: 180px; }
            .titulo-flotante { font-size: 2rem; top: 10%; }
            .spotify-player { bottom: 10px; width: 95%; height: 75px; }
            .netflix-n { font-size: 8rem; }
        }
        .not-loaded * { animation-play-state: paused !important; }
    </style>
</head>

        // --- SISTEMA DE SCROLL SNAP ---
        const observerOptions = { root: document.getElementById('main-container'), threshold: 0.6 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (entry.target.id === 'universo' && currentProfile === 'san_valentin') { initStars(); animateStars(); }
                    if (entry.target.id === 'corazon-scene') { initHeart(); animateHeart(); vibrate(40); }
                    if (entry.target.id === 'galeria') { crearCarrusel(); }
                    if (entry.target.id === 'film-scene') { crearFilmStrip(); }
                }
            });
        }, observerOptions);
        document.querySelectorAll('.escena').forEach(escena => observer.observe(escena));

        // --- VIBRACIÓN ---
        function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

            const y = document.getElementById('year-select').value;

                setTimeout(() => {

                const card = document.querySelector('.login-card'); card.style.animation = 'shake 0.3s'; document.getElementById('error-msg').style.opacity = '1'; setTimeout(() => card.style.animation = '', 300);

        // --- SELECCIÓN DE PERFIL ---
        function selectProfile(profile) {
            vibrate(30);
            currentProfile = profile;
            document.getElementById('profile-overlay').style.opacity = '0';
            
            const escenasSV = document.querySelectorAll('.escena-sv');

        function goBackToMenu() {
            vibrate(30);
            document.getElementById('spotify-player').classList.remove('visible');
            document.getElementById('back-btn').style.display = 'none';
            document.body.classList.add('not-loaded');

        // --- PLAYLIST ---
        function initPlaylist() {
            const list = document.getElementById('song-list');
            const dropdown = document.getElementById('track-dropdown');
            
            PLAYLIST.forEach((song, index) => {
                const btn = document.createElement('div'); btn.className = 'song-btn';
                btn.innerHTML = `<span style="font-size:1.2rem;color:var(--accent)">▶</span><div style="overflow:hidden;"><div style="font-weight:bold;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${song.titulo}</div><div style="font-size:0.75rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${song.artista}</div></div>`;
                btn.onclick = () => { vibrate(30); startExperience(index); };
                list.appendChild(btn);

                const opt = document.createElement('option');
                opt.value = index; opt.innerText = `${song.titulo} - ${song.artista}`;
                dropdown.appendChild(opt);
            });
        }

        function startExperience(index) {
            loadSong(index);
            document.getElementById('music-overlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('music-overlay').style.display = 'none'; 
                document.getElementById('spotify-player').classList.add('visible'); 
            }, 800);
            
            document.body.classList.remove('not-loaded');
            if(currentProfile === 'san_valentin'){ initStars(); animateStars(); typeWriter(); }
            if(currentProfile === '6_meses') { crearFilmStrip(); }
        }

        function loadSong(index) {
            currentSongIndex = index; const song = PLAYLIST[currentSongIndex]; 
            audio.src = encodeURI(song.archivo);
            document.getElementById('track-dropdown').value = index;
            document.getElementById('track-artist').innerText = song.artista;
            audio.play().then(() => updatePlayIcon(true)).catch(e => console.log("Espera interacción"));
        }

        // --- CONTROLES REPRODUCTOR ---
        function togglePlayPause() { vibrate(30); if (audio.paused) { audio.play(); updatePlayIcon(true); } else { audio.pause(); updatePlayIcon(false); } }
        function updatePlayIcon(isPlaying) { 
            const btn = document.getElementById('play-btn');
            if (isPlaying) btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>`;
            else btn.innerHTML = `<svg viewBox="0 0 24 24" style="margin-left: 2px;"><path d="M8 5v14l11-7z"></path></svg>`;
        }
        
        function toggleShuffle() {
            vibrate(20); isShuffle = !isShuffle;
            const btn = document.getElementById('shuffle-btn');
            if(isShuffle) btn.classList.add('shuffle-active'); else btn.classList.remove('shuffle-active');
        }

        function nextSong() { 
            vibrate(30); 
            if(isShuffle) currentSongIndex = Math.floor(Math.random() * PLAYLIST.length);
            else currentSongIndex = (currentSongIndex + 1) % PLAYLIST.length; 
            loadSong(currentSongIndex); 
        }
        function prevSong() { vibrate(30); currentSongIndex = (currentSongIndex - 1 + PLAYLIST.length) % PLAYLIST.length; loadSong(currentSongIndex); }
        audio.ontimeupdate = () => { document.getElementById('progress-bar').style.width = `${(audio.currentTime / audio.duration) * 100}%`; };
        audio.onended = () => nextSong();

        // --- CANVAS (SOLO PARA SAN VALENTIN) ---
        const starCanvas = document.getElementById('starCanvas'); const sCtx = starCanvas.getContext('2d'); let stars = [];
        function initStars() { starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight; stars = []; for(let i=0; i<300; i++) stars.push({x:Math.random()*starCanvas.width, y:Math.random()*starCanvas.height, z:Math.random()*starCanvas.width}); }
        function animateStars() { if(currentProfile !== 'san_valentin') return; sCtx.fillStyle = "black"; sCtx.fillRect(0,0,starCanvas.width, starCanvas.height); sCtx.fillStyle = "white"; stars.forEach(s => { s.z -= 2; if(s.z <= 0) s.z = starCanvas.width; let x = (s.x-starCanvas.width/2)*(starCanvas.width/s.z)+starCanvas.width/2; let y = (s.y-starCanvas.height/2)*(starCanvas.width/s.z)+starCanvas.height/2; let size = (1-s.z/starCanvas.width)*2; if(x>0 && x<starCanvas.width && y>0 && y<starCanvas.height) { sCtx.beginPath(); sCtx.arc(x,y,size,0,Math.PI*2); sCtx.fill(); } }); requestAnimationFrame(animateStars); }

        const hCanvas = document.getElementById('heartCanvas'); const hCtx = hCanvas.getContext('2d'); let hPoints = []; let angY = 0;
        function initHeart() { 
            hCanvas.width = window.innerWidth; hCanvas.height = window.innerHeight; hPoints = []; 
            for(let i=0; i<1200; i++) { let t = Math.random()*Math.PI*2, x = 16*Math.pow(Math.sin(t),3), y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); let z = (Math.random()-0.5)*10; hPoints.push({x:x*10, y:y*10, z:z*10, color: `hsl(${330+Math.random()*40}, 90%, 60%)`}); } 
            hCanvas.addEventListener('click', () => { vibrate([100, 50, 100]); });
        }
        function animateHeart() { if(currentProfile !== 'san_valentin') return; hCtx.fillStyle = "rgba(0,0,0,0.2)"; hCtx.fillRect(0,0,hCanvas.width, hCanvas.height); angY += 0.015; let cx = hCanvas.width/2, cy = hCanvas.height/2; let scaleFactor = window.innerWidth < 768 ? 300 : 500; hPoints.forEach(p => { let rx = p.x*Math.cos(angY) - p.z*Math.sin(angY); let rz = p.x*Math.sin(angY) + p.z*Math.cos(angY); let scale = scaleFactor/(scaleFactor+rz); if(scale>0) { hCtx.fillStyle = p.color; hCtx.beginPath(); hCtx.arc(rx*scale+cx, p.y*scale+cy, 1.5*scale, 0, Math.PI*2); hCtx.fill(); } }); requestAnimationFrame(animateHeart); }

        // --- CARRUSEL ORIGINAL ---
        function crearCarrusel() {
            const container = document.getElementById('carousel');
            if(container.children.length > 0) return;
            const radius = window.innerWidth < 768 ? 180 : 300; const angleStep = 360/GALERIA.length;
            GALERIA.forEach((item, i) => {
                const div = document.createElement('div'); div.className = 'foto-card';
                div.style.transform = `rotateY(${i*angleStep}deg) translateZ(${radius}px)`;
                div.innerHTML = `<img src="${item.url}">`;
                div.onclick = () => { vibrate(30); showDescription(item.url, item.desc); };
                container.appendChild(div);
            });
        }

        // --- ROLLO DE PELÍCULA (6 MESES) ---
        function crearFilmStrip() {
            const container = document.getElementById('film-strip');
            if(container.children.length > 0) return;
            
            GALERIA_6MESES.forEach((item) => {
                const div = document.createElement('div'); div.className = 'film-frame';
                div.innerHTML = `<img src="${item.url}">`;
                div.onclick = () => { vibrate(30); showDescription(item.url, item.desc); };
                container.appendChild(div);
            });
        }

        // --- MODALES Y TEXTOS ---
        function showDescription(url, desc) {
            document.getElementById('detail-img').src = url;
            document.getElementById('detail-text').innerText = desc;
            document.getElementById('photo-overlay').classList.add('active');
        }
        function closeDescription() { vibrate(30); document.getElementById('photo-overlay').classList.remove('active'); }

        let tIdx=0, cIdx=0, isDel=false;
        function typeWriter() { const txt = FRASES[tIdx]; const el = document.getElementById('maquina-escribir'); el.innerText = isDel ? txt.substring(0, cIdx--) : txt.substring(0, cIdx++); let spd = isDel ? 50 : 100; if(!isDel && cIdx === txt.length+1) { spd = 2000; isDel = true; } else if(isDel && cIdx === 0) { isDel = false; tIdx = (tIdx+1)%FRASES.length; spd = 500; } setTimeout(typeWriter, spd); }

        window.onload = () => { initPlaylist(); };
        window.addEventListener('resize', () => { initStars(); initHeart(); });
    </script>
</body>
</html>
