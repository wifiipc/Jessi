<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para ti ❤️</title>
    <style>
        /* --- FUENTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Dancing+Script:wght@700&family=Pacifico&display=swap');

        /* --- BASE & RESET --- */
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
        :root { --dark-color: #000; --accent: #ff4d6d; --glass: rgba(255, 255, 255, 0.1); }

        html { background-color: var(--dark-color); overscroll-behavior: none; }

        body {
            margin: 0; background-color: var(--dark-color);
            font-family: 'Montserrat', sans-serif; color: white;
            height: 100dvh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #main-container {
            height: 100dvh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory;
            scroll-behavior: smooth; position: absolute; top: 0; left: 0; scrollbar-width: none;
        }
        #main-container::-webkit-scrollbar { display: none; }

        .escena {
            position: relative; width: 100%; height: 100dvh;
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 40000; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .login-card {
            text-align: center; width: 85%; max-width: 350px; padding: 30px;
            background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; box-shadow: 0 0 40px rgba(255, 77, 109, 0.15);
        }
        .date-inputs { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        select { background: #222; color: white; border: 1px solid #444; padding: 12px 5px; border-radius: 10px; flex: 1; outline: none; }
        .unlock-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; }
        .error-msg { color: #ff4d4d; margin-top: 15px; font-size: 0.9rem; opacity: 0; transition: 0.3s; }

        /* --- POP-UP SELECCIÓN MÚSICA --- */
        #music-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 30000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .music-card { background: #121212; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; }
        .song-list { display: flex; flex-direction: column; gap: 10px; height: 50vh; overflow-y: auto; margin-top: 20px; padding-right: 5px; }
        /* Scrollbar personalizada para la lista de canciones */
        .song-list::-webkit-scrollbar { width: 6px; }
        .song-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .song-btn { background: #282828; color: white; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; text-align: left; transition: 0.2s; }
        .song-btn:active { background: #444; }

        /* --- REPRODUCTOR FLOTANTE --- */
        .spotify-player {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; height: 75px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 20000; opacity: 0; pointer-events: none; transition: 0.5s;
        }
        .spotify-player.visible { opacity: 1; pointer-events: all; }
        .track-info { flex-grow: 1; overflow: hidden; margin-right: 15px; }
        .track-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 0.7rem; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .play-btn { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width 0.1s linear; }

        /* --- ESCENAS --- */
        #universo { background: black; }
        #starCanvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ff4d6d; text-shadow: 0 0 15px var(--accent); }
        
        .titulo-flotante { position: absolute; top: 15%; font-family: 'Pacifico'; font-size: 2.2rem; color: #ff99ac; text-align: center; width: 100%; z-index: 10; animation: flotar 3s infinite; }
        
        #corazon-scene { background: radial-gradient(circle, #1a0b14 0%, #000 100%); }
        #heartCanvas { position: absolute; z-index: 1; }

        #galeria { background: #000; }
        .carousel-container { position: relative; width: 130px; height: 180px; transform-style: preserve-3d; animation: rotarCarrusel 20s infinite linear; }
        .foto-card { position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; }
        .foto-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- MODAL FOTO --- */
        #photo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 25000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .photo-detail-card { background: #151515; padding: 15px; border-radius: 20px; max-width: 400px; width: 100%; text-align: center; }
        .photo-detail-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        /* --- ANIMACIONES --- */
        @keyframes rotarCarrusel { from { transform: perspective(1000px) rotateY(0deg); } to { transform: perspective(1000px) rotateY(360deg); } }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>

            { titulo: "COSAS QUE NO TE DIJE", artista: "SAIKO", archivo: "SAIKO - COSAS QUE NO TE DIJE (SPOTISAVER).mp3" },
            { titulo: "Cristina", artista: "Sebastian Yatra", archivo: "Sebastian Yatra - Cristina (SPOTISAVER).mp3" },
            { titulo: "Vuelve", artista: "Sebastian Yatra, Beret", archivo: "Sebastian Yatra, Beret - Vuelve (SPOTISAVER).mp3" },
            { titulo: "La Plena", artista: "W Sound, Beéle, Ovy On The Drums", archivo: "W Sound, Beéle, Ovy On The Drums - La Plena - W Sound 05 (SPOTISAVER).mp3" },
            { titulo: "Reventar la Ciudad", artista: "Walls, Funzo & Baby Loud", archivo: "Walls, Funzo & Baby Loud - Reventar la Ciudad (SPOTISAVER).mp3" },
            { titulo: "Huracán", artista: "Funzo & BabyLoud", archivo: "cancion1.mp3" },
            { titulo: "Yellow", artista: "Coldplay", archivo: "cancion2.mp3" },
            { titulo: "Lo que pido", artista: "DePol", archivo: "cancion3.mp3" },
            { titulo: "12x3", artista: "DEKKO", archivo: "cancion4.mp3" },
            { titulo: "DETRÁS DE TU ALMA", artista: "Mora", archivo: "cancion5.mp3" }, 
            { titulo: "Inolvidable", artista: "Beéle & Ovy On The Drum", archivo: "cancion6.mp3" }
        ];

        const FRASES = ["Eres mi niña hermosa", "El amor de mi vida", "Mi casualidad favorita", "Te amo infinito"];
        const GALERIA = [
            { url: "foto1.jpeg", desc: "No se me veían las intenciones ni nada..." },
            { url: "foto2.jpeg", desc: "Nuestro primer atardecer siendo novios." },
            { url: "foto3.jpeg", desc: "Tú durmiendo toda mona. :)" },
            { url: "foto4.jpeg", desc: "Dos palabras: Monte Ferro. " },
            { url: "foto5.jpeg", desc: "nuestros primeros reyes juntos" }
        ];

        let currentSongIndex = 0;
        const audio = document.getElementById('bg-music');

        // LOGIN LOGIC
        const daySelect = document.getElementById('day-select');
        for(let i=1; i<=31; i++) { let opt = document.createElement('option'); opt.value = i; opt.innerText = i; daySelect.appendChild(opt); }

        function checkPassword() {
            const d = document.getElementById('day-select').value;
            const m = document.getElementById('month-select').value;
            const y = document.getElementById('year-select').value;
            
            if (d == 25 && m == 10 && y == 2025) { 
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    showMusicMenu();
                }, 800);
            } else {
                document.getElementById('error-msg').style.opacity = '1';
            }
        }

        function showMusicMenu() {
            const menu = document.getElementById('music-overlay');
            const list = document.getElementById('song-list');
            menu.style.display = 'flex';
            setTimeout(() => menu.style.opacity = '1', 50);

            PLAYLIST.forEach((song, i) => {
                const btn = document.createElement('div');
                btn.className = 'song-btn';
                btn.innerHTML = `<span style="color:var(--accent); font-size:1.2rem;">▶</span> 
                                 <div style="overflow:hidden;">
                                    <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${song.titulo}</div>
                                    <div style="font-size:0.75rem; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${song.artista}</div>
                                 </div>`;
                btn.onclick = () => startApp(i);
                list.appendChild(btn);
            });
        }

        function startApp(index) {
            document.getElementById('music-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('music-overlay').style.display = 'none';
                document.getElementById('spotify-player').classList.add('visible');
                loadSong(index);
                initStars(); animateStars(); typeWriter();
                document.body.classList.remove('not-loaded');
            }, 800);
        }

        // AUDIO ENGINE
        function loadSong(index) {
            currentSongIndex = index;
            const song = PLAYLIST[currentSongIndex];
            audio.src = encodeURI(song.archivo); // Codificamos la URL por los espacios en los nombres de archivo
            document.getElementById('track-title').innerText = song.titulo;
            document.getElementById('track-artist').innerText = song.artista;
            audio.play();
            updatePlayIcon(true);
        }

        function togglePlayPause() {
            if (audio.paused) { audio.play(); updatePlayIcon(true); }
            else { audio.pause(); updatePlayIcon(false); }
        }

        function updatePlayIcon(isP) {
            const icon = document.getElementById('play-btn');
            icon.innerHTML = isP ? 
                '<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>' : 
                '<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white;margin-left:2px;"><path d="M8 5v14l11-7z"></path></svg>';
        }

        function nextSong() { currentSongIndex = (currentSongIndex + 1) % PLAYLIST.length; loadSong(currentSongIndex); }
        function prevSong() { currentSongIndex = (currentSongIndex - 1 + PLAYLIST.length) % PLAYLIST.length; loadSong(currentSongIndex); }

        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
        };
        audio.onended = () => nextSong();

        // VISUALS (Estrellas, Corazón, Carrusel)
        const starCanvas = document.getElementById('starCanvas');
        const sCtx = starCanvas.getContext('2d');
        let stars = [];

        function initStars() {
            starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<200; i++) stars.push({x: Math.random()*starCanvas.width, y: Math.random()*starCanvas.height, size: Math.random()*2});
        }

        function animateStars() {
            sCtx.clearRect(0,0,starCanvas.width, starCanvas.height);
            sCtx.fillStyle = "white";
            stars.forEach(s => {
                s.y += 0.5; if(s.y > starCanvas.height) s.y = 0;
                sCtx.beginPath(); sCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); sCtx.fill();
            });
            requestAnimationFrame(animateStars);
        }

        // Títulos en máquina de escribir
        let tIdx=0, charIdx=0, isDeleting=false;
        function typeWriter() {
            const currentFrase = FRASES[tIdx];
            const el = document.getElementById('maquina-escribir');
            el.innerText = isDeleting ? currentFrase.substring(0, charIdx--) : currentFrase.substring(0, charIdx++);
            
            let speed = isDeleting ? 50 : 100;
            if(!isDeleting && charIdx === currentFrase.length + 1) { isDeleting = true; speed = 2000; }
            else if(isDeleting && charIdx === 0) { isDeleting = false; tIdx = (tIdx + 1) % FRASES.length; speed = 500; }
            setTimeout(typeWriter, speed);
        }

        // Carrusel
        function crearCarrusel() {
            const container = document.getElementById('carousel');
            if(container.children.length > 0) return;
            GALERIA.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = 'foto-card';
                div.style.transform = `rotateY(${i * (360/GALERIA.length)}deg) translateZ(200px)`;
                div.innerHTML = `<img src="${img.url}" onclick="showPhoto('${img.url}', \`${img.desc}\`)">`;
                container.appendChild(div);
            });
        }

        function showPhoto(url, desc) {
            document.getElementById('detail-img').src = url;
            document.getElementById('detail-text').innerText = desc;
            document.getElementById('photo-overlay').style.display = 'flex';
        }

        // Iniciar observador para escenas
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting && e.target.id === 'galeria') crearCarrusel();
                if(e.isIntersecting && e.target.id === 'corazon-scene') { initHeart(); animateHeart(); }
            });
        }, {threshold: 0.5});
        document.querySelectorAll('.escena').forEach(s => obs.observe(s));

        // Corazón 3D (Simplificado)
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        function initHeart() { hCanvas.width = window.innerWidth; hCanvas.height = window.innerHeight; }
        function animateHeart() {
            hCtx.clearRect(0,0,hCanvas.width, hCanvas.height);
            hCtx.fillStyle = "#ff4d6d";
            hCtx.font = "50px Arial";
            hCtx.textAlign = "center";
            hCtx.fillText("❤️", hCanvas.width/2, hCanvas.height/2);
        }

        window.onresize = () => { initStars(); initHeart(); };
    </script>
</body>
</html>
